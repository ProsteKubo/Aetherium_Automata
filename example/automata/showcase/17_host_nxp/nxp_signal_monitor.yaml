# ============================================================================
# NXP Signal Monitor — hardware side of the host↔NXP showcase pair
# ============================================================================
#
# Deploy on: mcxn947-core0
# Pair with:  stochastic_beacon.yaml on host_cpp_01
#
# No manual wiring needed. The gateway auto-routes by matching variable names:
#
#   signal_level  (input  here)  ←  signal_level  (output in stochastic_beacon)
#   nxp_touch_pressed (output here) → nxp_touch_pressed (input in stochastic_beacon)
#
# LED mapping (FRDM-MCXN947):
#   GPIO 10 = red  LED — on during Alerting / TouchActive
#   GPIO 27 = green LED — on during Monitoring / TouchActive
#
# State machine:
#   Init        → Dormant      (1 s boot)
#   Dormant     — both off     — signal_level = "idle" or "cooldown"
#   Monitoring  — green on     — signal_level = "low" or "medium"
#   Alerting    — red on       — signal_level = "high"
#   TouchActive — both on      — touch pad held (any signal level)
#
# Signal transitions fire the instant signal_level changes (event/on_change),
# so LED changes are immediate and there is no per-tick condition polling.
# Touch transitions use classic conditions; the touch pad is sampled only
# during transition evaluation and is the only hardware I/O in this file.
#
# ============================================================================

version: 0.0.1

config:
  name: NXP Signal Monitor
  type: inline
  language: lua
  description: FRDM-MCXN947 automata that monitors low, medium, and high signal levels from a host beacon, drives red/green LEDs accordingly, and locally overrides both LEDs while the onboard touch pad is pressed.
  author: Aetherium Team
  tags:
    - showcase
    - mcxn947
    - communication
    - hardware-safe
  target:
    profile: mcxn947_lua_v1

variables:
  - name: signal_level
    type: string
    direction: input
    default: "idle"

  - name: nxp_touch_pressed
    type: bool
    direction: output
    default: false

  - name: red_led
    type: bool
    direction: output
    default: false

  - name: green_led
    type: bool
    direction: output
    default: false

automata:
  initial_state: Init

  states:
    Init:
      on_enter: |-
        gpio.mode(10, "output")
        gpio.mode(27, "output")
        gpio.write(10, false)
        gpio.write(27, false)
        setOutput("red_led", false)
        setOutput("green_led", false)
        component("touch_pad"):init()

    Dormant:
      on_enter: |-
        gpio.write(10, false)
        gpio.write(27, false)
        setOutput("red_led", false)
        setOutput("green_led", false)
        setOutput("nxp_touch_pressed", false)

    Monitoring:
      on_enter: |-
        gpio.write(10, false)
        gpio.write(27, true)
        setOutput("red_led", false)
        setOutput("green_led", true)
        setOutput("nxp_touch_pressed", false)

    Alerting:
      on_enter: |-
        gpio.write(10, true)
        gpio.write(27, false)
        setOutput("red_led", true)
        setOutput("green_led", false)
        setOutput("nxp_touch_pressed", false)

    TouchActive:
      on_enter: |-
        gpio.write(10, true)
        gpio.write(27, true)
        setOutput("red_led", true)
        setOutput("green_led", true)
        setOutput("nxp_touch_pressed", true)

  transitions:
    init_to_dormant:
      from: Init
      to: Dormant
      type: timed
      after: "1s"

    # ── Signal-level transitions (event-driven: fire on signal_level change) ──

    dormant_to_monitoring:
      from: Dormant
      to: Monitoring
      type: event
      event:
        triggers:
          - signal: signal_level
            trigger: on_change
        condition: value("signal_level") == "low" or value("signal_level") == "medium"

    dormant_to_alerting:
      from: Dormant
      to: Alerting
      type: event
      event:
        triggers:
          - signal: signal_level
            trigger: on_change
        condition: value("signal_level") == "high"

    monitoring_to_dormant:
      from: Monitoring
      to: Dormant
      type: event
      event:
        triggers:
          - signal: signal_level
            trigger: on_change
        condition: value("signal_level") == "idle" or value("signal_level") == "cooldown"

    monitoring_to_alerting:
      from: Monitoring
      to: Alerting
      type: event
      event:
        triggers:
          - signal: signal_level
            trigger: on_change
        condition: value("signal_level") == "high"

    alerting_to_dormant:
      from: Alerting
      to: Dormant
      type: event
      event:
        triggers:
          - signal: signal_level
            trigger: on_change
        condition: value("signal_level") == "idle" or value("signal_level") == "cooldown"

    alerting_to_monitoring:
      from: Alerting
      to: Monitoring
      type: event
      event:
        triggers:
          - signal: signal_level
            trigger: on_change
        condition: value("signal_level") == "low" or value("signal_level") == "medium"

    # ── Touch-pad transitions (classic: condition evaluated each tick) ──

    dormant_to_touch:
      from: Dormant
      to: TouchActive
      type: classic
      condition: component("touch_pad"):pressed()

    monitoring_to_touch:
      from: Monitoring
      to: TouchActive
      type: classic
      condition: component("touch_pad"):pressed()

    alerting_to_touch:
      from: Alerting
      to: TouchActive
      type: classic
      condition: component("touch_pad"):pressed()

    touch_to_dormant:
      from: TouchActive
      to: Dormant
      type: classic
      condition: not component("touch_pad"):pressed() and (value("signal_level") == "idle" or value("signal_level") == "cooldown")

    touch_to_monitoring:
      from: TouchActive
      to: Monitoring
      type: classic
      condition: not component("touch_pad"):pressed() and (value("signal_level") == "low" or value("signal_level") == "medium")

    touch_to_alerting:
      from: TouchActive
      to: Alerting
      type: classic
      condition: not component("touch_pad"):pressed() and value("signal_level") == "high"
