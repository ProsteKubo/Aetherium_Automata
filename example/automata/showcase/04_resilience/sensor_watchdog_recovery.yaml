version: 0.0.1

config:
  name: Sensor Watchdog Recovery
  type: inline
  description: Flagship heartbeat watchdog with priming, missed-beat detection, retry windows, backoff, failure, and reset-audit phases.
  author: Aetherium Team
  tags:
    - showcase
    - resilience
    - watchdog
    - timeout
    - flagship

variables:
  - name: heartbeat
    type: bool
    direction: input
    default: false

  - name: manual_reset
    type: bool
    direction: input
    default: false

  - name: max_retries
    type: int
    direction: input
    default: 3

  - name: retry_count
    type: int
    direction: output
    default: 0

  - name: watchdog_ok
    type: bool
    direction: output
    default: false

  - name: fault
    type: bool
    direction: output
    default: false

  - name: watchdog_state
    type: string
    direction: output
    default: boot

automata:
  initial_state: Boot

  states:
    Boot:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("retry_count", 0)
        setVal("watchdog_state", "boot")

    PrimeSensors:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("watchdog_state", "prime_sensors")

    Healthy:
      on_enter: |
        setVal("watchdog_ok", true)
        setVal("fault", false)
        setVal("watchdog_state", "healthy")

    MissedBeat:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("watchdog_state", "missed_beat")

    RetryWindow:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("watchdog_state", "retry_window")

    Recovering:
      on_enter: |
        setVal("retry_count", value("retry_count") + 1)
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("watchdog_state", "recovering")

    Backoff:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("watchdog_state", "backoff")

    Failed:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", true)
        setVal("watchdog_state", "failed")

    ResetAudit:
      on_enter: |
        setVal("watchdog_ok", false)
        setVal("fault", false)
        setVal("watchdog_state", "reset_audit")

  transitions:
    boot_to_prime:
      from: Boot
      to: PrimeSensors
      type: timed
      after: 150

    prime_to_healthy:
      from: PrimeSensors
      to: Healthy
      type: event
      priority: 0
      event:
        triggers:
          - signal: heartbeat
            trigger: on_rise

    prime_to_missed:
      from: PrimeSensors
      to: MissedBeat
      type: timed
      priority: 1
      after: 600

    healthy_timeout:
      from: Healthy
      to: MissedBeat
      type: timed
      timed:
        mode: timeout
        delay_ms: 5s

    missed_on_heartbeat:
      from: MissedBeat
      to: Healthy
      type: event
      priority: 0
      event:
        triggers:
          - signal: heartbeat
            trigger: on_rise

    missed_to_retry_window:
      from: MissedBeat
      to: RetryWindow
      type: timed
      priority: 1
      after: 300

    retry_on_heartbeat:
      from: RetryWindow
      to: Healthy
      type: event
      priority: 0
      event:
        triggers:
          - signal: heartbeat
            trigger: on_rise

    retry_to_recovering:
      from: RetryWindow
      to: Recovering
      type: classic
      priority: 1
      condition: value("retry_count") < value("max_retries")

    retry_to_failed:
      from: RetryWindow
      to: Failed
      type: classic
      priority: 2
      condition: value("retry_count") >= value("max_retries")

    recovering_to_backoff:
      from: Recovering
      to: Backoff
      type: timed
      after: 250

    backoff_on_heartbeat:
      from: Backoff
      to: Healthy
      type: event
      priority: 0
      event:
        triggers:
          - signal: heartbeat
            trigger: on_rise

    backoff_to_retry_window:
      from: Backoff
      to: RetryWindow
      type: timed
      priority: 1
      after: 800

    failed_to_reset_audit:
      from: Failed
      to: ResetAudit
      type: event
      event:
        triggers:
          - signal: manual_reset
            trigger: on_rise

    reset_audit_to_boot:
      from: ResetAudit
      to: Boot
      type: timed
      after: 150
