version: 0.0.1

config:
  name: ESP32 Status LED Probe
  type: inline
  language: lua
  description: IDE-first ESP32 probe that cycles common digital LED pins and exports the currently tested pin so the visible onboard LED can be identified without sketches.
  author: Aetherium Team
  tags:
    - showcase
    - esp32
    - ide
    - gpio
    - diagnostics
    - hardware-safe
  target:
    profile: esp32_lua_v1

variables:
  - name: probe_pin
    type: int
    direction: output
    default: 0
  - name: probe_phase
    type: bool
    direction: output
    default: false

automata:
  initial_state: Probe

  states:
    Probe:
      hooks:
        onEnter: |-
          probe_pins = {2, 4, 5, 18, 19, 21, 22, 23}
          probe_index = 1
          probe_phase_high = true
          probe_next_at = 0

          for i = 1, #probe_pins do
            gpio.mode(probe_pins[i], "output")
            gpio.write(probe_pins[i], 0)
          end
      code: |-
        if probe_next_at ~= nil and now() < probe_next_at then
          return
        end

        local current_pin = probe_pins[probe_index]
        probe_next_at = now() + 700

        if probe_phase_high then
          gpio.write(current_pin, 1)
          setOutput("probe_pin", current_pin)
          setOutput("probe_phase", true)
          probe_phase_high = false
          return
        end

        gpio.write(current_pin, 0)
        setOutput("probe_pin", current_pin)
        setOutput("probe_phase", false)
        probe_phase_high = true
        probe_index = probe_index + 1

        if probe_index > #probe_pins then
          probe_index = 1
        end

  transitions:
    stay_active:
      from: Probe
      to: Probe
      type: classic
      condition: false
