version: "0.0.1"

config:
  name: MCXN947 GPIO LED Blink
  type: inline
  language: lua
  description: Alternates red and green LEDs on FRDM-MCXN947 (pins 10 and 27) to verify GPIO output without needing button input.
  author: Aetherium Team
  tags:
    - showcase
    - mcxn947
    - gpio
    - led
  target:
    profile: mcxn947_lua_v1

variables:
  - name: led_state
    type: string
    direction: output
    default: "off"

automata:
  initial_state: Red

  states:
    Red:
      on_enter: |
        gpio.mode(10, "output")
        gpio.mode(27, "output")
        gpio.write(10, 1)
        gpio.write(27, 0)
        setOutput("led_state", "red")

    Green:
      on_enter: |
        gpio.write(10, 0)
        gpio.write(27, 1)
        setOutput("led_state", "green")

    Off:
      on_enter: |
        gpio.write(10, 0)
        gpio.write(27, 0)
        setOutput("led_state", "off")

  transitions:
    red_to_green:
      from: Red
      to: Green
      type: timed
      timed:
        mode: after
        delay_ms: 1000ms

    green_to_off:
      from: Green
      to: Off
      type: timed
      timed:
        mode: after
        delay_ms: 1000ms

    off_to_red:
      from: Off
      to: Red
      type: timed
      timed:
        mode: after
        delay_ms: 1000ms
