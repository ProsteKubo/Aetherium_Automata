version: "0.0.1"

config:
  name: "ESP-NXP 04 - Trio NXP Side"
  type: inline
  language: lua
  description: "Step 4 (NXP side): Receives mode from the stochastic host via gateway. Both LEDs off=idle, green (pin 27)=active, red (pin 10)=alert."
  author: Aetherium Team
  tags: [showcase, mcxn947, gpio, led, comms, stochastic]
  target:
    profile: mcxn947_lua_v1

variables:
  - name: mode
    type: string
    direction: input
    default: "idle"

automata:
  initial_state: Idle

  states:
    Idle:
      on_enter: |
        gpio.mode(10, "output")
        gpio.mode(27, "output")
        gpio.write(10, 0)
        gpio.write(27, 0)

    Active:
      on_enter: |
        gpio.write(10, 0)
        gpio.write(27, 1)

    Alert:
      on_enter: |
        gpio.write(10, 1)
        gpio.write(27, 0)

  transitions:
    to_active:
      from: Idle
      to: Active
      type: classic
      condition: value("mode") == "active"

    to_alert:
      from: Idle
      to: Alert
      type: classic
      condition: value("mode") == "alert"

    active_to_idle:
      from: Active
      to: Idle
      type: classic
      condition: value("mode") == "idle"

    active_to_alert:
      from: Active
      to: Alert
      type: classic
      condition: value("mode") == "alert"

    alert_to_idle:
      from: Alert
      to: Idle
      type: classic
      condition: value("mode") == "idle"

    alert_to_active:
      from: Alert
      to: Active
      type: classic
      condition: value("mode") == "active"
