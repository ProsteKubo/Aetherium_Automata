version: "0.0.1"

config:
  name: "ESP-NXP 01 - NXP GPIO Write"
  type: inline
  language: lua
  description: "Step 1 (NXP): Alternates red (pin 10) and green (pin 27) LEDs on FRDM-MCXN947 every 1s. Verifies GPIO output. Pins are active-low on the board."
  author: Aetherium Team
  tags: [showcase, mcxn947, gpio, output, led]
  target:
    profile: mcxn947_lua_v1

variables:
  - name: led_state
    type: string
    direction: output
    default: "off"

automata:
  initial_state: Red

  states:
    Red:
      on_enter: |
        gpio.mode(10, "output")
        gpio.mode(27, "output")
        gpio.write(10, 1)
        gpio.write(27, 0)
        setOutput("led_state", "red")

    Green:
      on_enter: |
        gpio.write(10, 0)
        gpio.write(27, 1)
        setOutput("led_state", "green")

  transitions:
    red_to_green:
      from: Red
      to: Green
      type: timed
      timed:
        mode: after
        delay_ms: 1000ms

    green_to_red:
      from: Green
      to: Red
      type: timed
      timed:
        mode: after
        delay_ms: 1000ms
