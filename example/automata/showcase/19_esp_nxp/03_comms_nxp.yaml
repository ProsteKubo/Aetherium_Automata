version: "0.0.1"

config:
  name: "ESP-NXP 03 - Comms NXP Side"
  type: inline
  language: lua
  description: "Step 3 (NXP side): Receives sensor_high input wired from ESP32. Green LED (pin 27) when low, Red LED (pin 10) when high. Pins 10 and 27 are active-low on FRDM-MCXN947."
  author: Aetherium Team
  tags: [showcase, mcxn947, gpio, led, comms]
  target:
    profile: mcxn947_lua_v1

variables:
  - name: sensor_high
    type: bool
    direction: input
    default: false

automata:
  initial_state: Low

  states:
    Low:
      on_enter: |
        gpio.mode(10, "output")
        gpio.mode(27, "output")
        gpio.write(10, 0)
        gpio.write(27, 1)

    High:
      on_enter: |
        gpio.write(10, 1)
        gpio.write(27, 0)

  transitions:
    go_high:
      from: Low
      to: High
      type: classic
      condition: value("sensor_high") == true

    go_low:
      from: High
      to: Low
      type: classic
      condition: value("sensor_high") == false
