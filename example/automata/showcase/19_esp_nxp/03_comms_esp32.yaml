version: "0.0.1"

config:
  name: "ESP-NXP 03 - Comms ESP32 Side"
  type: inline
  language: lua
  description: "Step 3 (ESP side): Reads ADC sensor on IO34, publishes sensor_mv and sensor_high outputs. The gateway wires sensor_high to the NXP partner. LED on IO23 mirrors sensor state."
  author: Aetherium Team
  tags: [showcase, esp32, gpio, adc, sensor, comms]
  target:
    profile: esp32_lua_v1

variables:
  - name: sensor_mv
    type: int
    direction: output
    default: 0
  - name: sensor_high
    type: bool
    direction: output
    default: false

automata:
  initial_state: Sense

  states:
    Sense:
      on_enter: |
        gpio.mode(23, "output")
        gpio.write(23, 0)
      code: |
        local mv = adc.read_mv(34)
        local high = mv > 1650
        gpio.write(23, high and 1 or 0)
        setOutput("sensor_mv", mv)
        setOutput("sensor_high", high)

  transitions:
    stay:
      from: Sense
      to: Sense
      type: classic
      condition: false
