version: "0.0.1"

config:
  name: "Engine Verify 04 - Host Probability Observer"
  type: inline
  description: "Host-side observer for weighted probabilistic branch outputs."
  tags: [engine, verification, host, probabilistic, weighted]

variables:
  - name: selected_path
    type: string
    direction: input
    default: "none"
  - name: a_count
    type: int
    direction: input
    default: 0
  - name: b_count
    type: int
    direction: input
    default: 0
  - name: observed_path
    type: string
    direction: output
    default: "none"
  - name: observed_total
    type: int
    direction: output
    default: 0

automata:
  initial_state: Watching

  states:
    Watching:
      code: |
        setOutput("observed_path", value("selected_path"))
        setOutput("observed_total", value("a_count") + value("b_count"))

    SeenBranch:
      on_enter: |
        setOutput("observed_path", value("selected_path"))
        setOutput("observed_total", value("a_count") + value("b_count"))

  transitions:
    branch_seen:
      from: Watching
      to: SeenBranch
      type: classic
      condition: value("a_count") + value("b_count") >= 1
